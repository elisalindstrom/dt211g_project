<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextTBR</title>
  <meta name="description" content="Track upcoming book releases from your favorite authors.">

  <!-- Faviconlänkar -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" type="image/png" href="/apple-touch-icon.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/src/css/main.scss">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo"><img src="/nextTBR-logo.svg"></a>
    </header>

    <div class="app">
      <main>
        <section class="main-content">
          <h1>Find your next To Be Read</h1>
          <p>Track your favorite authors upcoming book releases</p>

          <div class="search-section">
            <div id="search-message"></div>
            <form id="search-form" autocomplete="off">
              <input id="author-input" type="text" placeholder="Search by Author..." minlength="1" required>
              <button id="submit-btn" class="btn search-btn" type="submit">Search</button>
            </form>
          </div>

          <div class="saved-books">
            <div id="saved-card" class="hidden">
            </div>
          </div>

          <div class="author-section">
            <!-- Author profile -->
            <div id="author-info-card" class="hidden">
            </div>
          </div>

          <div id="loader" class="spinner hidden"></div>

          <div class="card-section">
            <!-- Upcoming releases -->
            <div id="upcoming-books" class="hidden">
            </div>
          </div>

          <div class="card-section">
            <!-- Published books -->
            <div id="published-books" class="hidden">
            </div>
          </div>
        </section>
      </main>

    </div>
  </div>
  <script type="module" src="/src/js/config.js"></script>
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
