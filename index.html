<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextTBR</title>
  <meta name="description" content="Track upcoming book releases from your favorite authors.">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/src/css/main.scss">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo"><img src="/public/nextTBR-logo.svg"></a>
    </header>

    <main>
      <section class="main-content">
        <h1>Find your next To Be Read</h1>
        <p>Track your favorite authors upcoming book releases</p>

        <div class="search-section">
          <div id="search-message"></div>
          <form autocomplete="off">
            <input id="author-input" type="text" placeholder="Search by Author...">
            <button id="submit-btn" class="btn" type="submit">Search</button>
          </form>
        </div>

        <div class="author-section">
          <!-- Author profile -->
          <div id="author-info-card" class="hidden">
          </div>
        </div>

        <div class="card-section">
          <!-- Upcoming releases -->
          <div id="upcoming-books" class="hidden">
          </div>
        </div>

        <div class="card-section">
          <!-- Published books -->
          <div id="published-books" class="hidden">
          </div>
        </div>

      </section>
    </main>
  </div>
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
