<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextTBR</title>
  <meta name="description" content="Track upcoming book releases from your favorite authors.">
  <!-- Stylesheet -->
  <link rel="stylesheet" href="/src/css/main.scss">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <a href="index.html" class="logo">NextTBR</a>
      <p>Find your next To Be Read - Track you favorite authors upcoming book releases</p>
    </header>

    <main>
      <div class="main-content">

        <div class="search-section">
          <form autocomplete="off">
            <input id="author-input" type="text" placeholder="Search author...">
            <button id="submit-btn" class="btn" type="submit">Search</button>
          </form>
        </div>

        <section class="author-section">
          <h1>Author profile</h1>
          <div id="author-info-card">
          </div>
        </section>

        <section class="card-section">
          <h2>Upcoming releases</h2>
          <div id="upcoming-book-card">
          </div>
        </section>

        <section class="card-section">
          <h2>Published books</h2>
          <div id="published-book-card">
          </div>
        </section>

      </div>
    </main>

    <footer>
      <p>NextTBR</p>
    </footer>
  </div>
  <script type="module" src="/src/js/main.js"></script>
</body>

</html>
